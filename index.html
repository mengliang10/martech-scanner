<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martech Tag Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 8px;
      color: #555;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #4f6ef7; }

    .input-row button {
      padding: 12px 22px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .input-row button:hover { background: #3b55e0; }
    .input-row button:disabled { opacity: 0.6; cursor: not-allowed; }

    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #4f6ef7;
      min-height: 20px;
    }

    #error {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #d93025;
      min-height: 20px;
    }

    #results {
      margin-top: 24px;
    }

    .summary {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 20px;
    }
    .summary strong { color: #1a1a2e; }

    .category-block {
      margin-bottom: 20px;
    }
    .category-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-pill {
      background: #eef1fd;
      color: #3b55e0;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: #888;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
    footer a { color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>Martech Tag Scanner</h1>
    <p>Enter any website URL to detect which marketing technology tags are installed.</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input
        type="text"
        id="urlInput"
        placeholder="https://example.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="scanBtn" onclick="handleScan()">Scan</button>
    </div>
    <div id="error"></div>
    <div id="status"></div>
    <div id="results"></div>
  </div>

  <footer>
    <p>Patterns sourced from <a href="https://github.com/wappalyzer/wappalyzer" target="_blank" rel="noopener">Wappalyzer</a> (MIT).
    Powered by headless Chromium via Playwright.</p>
  </footer>

  <script src="scanner.js"></script>
  <script>
    const urlInput = document.getElementById("urlInput");
    const scanBtn  = document.getElementById("scanBtn");
    const statusEl = document.getElementById("status");
    const errorEl  = document.getElementById("error");
    const resultsEl = document.getElementById("results");

    // Allow pressing Enter to trigger scan
    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleScan();
    });

    function clearUI() {
      statusEl.textContent = "";
      errorEl.textContent  = "";
      resultsEl.innerHTML  = "";
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
      errorEl.textContent  = "";
    }

    function setError(msg) {
      errorEl.textContent  = msg;
      statusEl.textContent = "";
      scanBtn.disabled = false;
    }

    function setResults(grouped, total, durationMs) {
      statusEl.textContent = "";
      scanBtn.disabled = false;

      if (total === 0) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>No known Martech tags detected.</p>
            <p style="margin-top:8px;font-size:0.82rem;">
              The page may use obfuscated tags, a server-side setup, or tags not yet in our pattern library.
            </p>
          </div>`;
        return;
      }

      const categories = Object.keys(grouped).sort();
      const dur = durationMs ? ` in ${(durationMs / 1000).toFixed(1)}s` : "";
      let html = `<p class="summary">Found <strong>${total} tag${total !== 1 ? "s" : ""}</strong> across ${categories.length} categor${categories.length !== 1 ? "ies" : "y"}${dur}.</p>`;

      for (const cat of categories) {
        const pills = grouped[cat]
          .map(name => `<span class="tag-pill">${name}</span>`)
          .join("");
        html += `
          <div class="category-block">
            <div class="category-title">${cat}</div>
            <div class="tag-list">${pills}</div>
          </div>`;
      }

      resultsEl.innerHTML = html;
    }

    async function handleScan() {
      clearUI();
      scanBtn.disabled = true;
      const url = urlInput.value;
      await runScan(url, { setStatus, setResults, setError });
    }
  </script>
</body>
</html>
